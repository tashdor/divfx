<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>divfx figures — MOSAIC authoring surface</title>
  <!-- Resolve the pinned package's bare specifiers to its published files. -->
  <script type="importmap">
  {
    "imports": {
      "@mosaic/technical-graphics": "/node_modules/@mosaic/technical-graphics/src/graphics.js",
      "@mosaic/technical-graphics/theme.css": "/node_modules/@mosaic/technical-graphics/src/theme.css"
    }
  }
  </script>
  <link rel="stylesheet" href="/node_modules/@mosaic/technical-graphics/src/theme.css">
</head>
<body>
  <main>
    <!-- Figure 1 — CDL grading operations applied prior to the viewing transform. -->
    <mosaic-process data-name="figure-01-cdl-pipeline"
      aria-label="CDL grading operations are applied prior to the viewing transform">
      <mosaic-node icon="plate" eyebrow="Source">Ungraded Log Plate</mosaic-node>
      <mosaic-node icon="cdl" eyebrow="Primary correction">ASC CDL</mosaic-node>
      <mosaic-node icon="lut" eyebrow="Display transform" detail="Display reference transform">Show LUT</mosaic-node>
      <mosaic-node icon="monitor" eyebrow="Viewing output">Rec.709 Preview</mosaic-node>
    </mosaic-process>

    <!-- Figure 5 — Reel-based composition of a feature. Each reel carries an 8 s head
         leader and a 4 s tail leader; program lengths are scaled to the longest reel. -->
    <mosaic-reel-timeline data-name="figure-05-reels" fps="24" head="192" tail="96"
      aria-label="Reel-based composition of a feature-length film">
      <mosaic-reel name="Reel 1" start="01:00:00:00" duration="00:18:22:06"></mosaic-reel>
      <mosaic-reel name="Reel 2" start="02:00:00:00" duration="00:19:41:15"></mosaic-reel>
      <mosaic-reel name="Reel 3" start="03:00:00:00" duration="00:17:55:11"></mosaic-reel>
      <mosaic-reel name="Reel 4" start="04:00:00:00" duration="00:20:03:19"></mosaic-reel>
      <mosaic-reel name="Reel 5" start="05:00:00:00" duration="00:16:48:02"></mosaic-reel>
      <mosaic-reel name="Reel 6" start="06:00:00:00" duration="00:12:37:20"></mosaic-reel>
    </mosaic-reel-timeline>

    <!-- ACES pipeline — left-to-right image path; VFX vendors are a tangent that
         round-trips through the ACES2065-1 interchange (in ACEScg), not a stage on
         the grade line. Output transforms fan the graded master out to deliverables. -->
    <mosaic-workflow data-name="aces-workflow"
      aria-label="ACES color pipeline: camera through the ACES2065-1 interchange to a graded master and deliverables, with VFX vendors as a tangent process off the interchange">
      <mosaic-workflow-node id="camera" rank="0" lane="2" icon="camera" tone="green">Camera / Source</mosaic-workflow-node>
      <mosaic-workflow-node id="interchange" rank="1" lane="2" icon="aces" tone="blue">ACES2065-1</mosaic-workflow-node>
      <mosaic-workflow-node id="vfx" rank="2" lane="0" icon="plate" tone="green">VFX Vendors</mosaic-workflow-node>
      <mosaic-workflow-node id="grade" rank="2" lane="2" icon="resolve" tone="violet">ACEScct Grade</mosaic-workflow-node>
      <mosaic-workflow-node id="master" rank="3" lane="2" icon="exr" tone="blue">Graded Master</mosaic-workflow-node>
      <mosaic-workflow-node id="rec709" rank="4" lane="1" icon="monitor" tone="coral">Rec.709</mosaic-workflow-node>
      <mosaic-workflow-node id="p3" rank="4" lane="2" icon="monitor" tone="coral">P3-D65</mosaic-workflow-node>
      <mosaic-workflow-node id="pq" rank="4" lane="3" icon="hdr" tone="coral">Rec.2100 PQ</mosaic-workflow-node>
      <mosaic-workflow-node id="dcdm" rank="4" lane="4" icon="dcp" tone="coral">DCDM</mosaic-workflow-node>
      <mosaic-edge from="camera" to="interchange"></mosaic-edge>
      <mosaic-edge from="interchange" to="vfx"></mosaic-edge>
      <mosaic-edge from="interchange" to="grade"></mosaic-edge>
      <mosaic-edge from="grade" to="master"></mosaic-edge>
      <mosaic-edge from="master" to="rec709"></mosaic-edge>
      <mosaic-edge from="master" to="p3"></mosaic-edge>
      <mosaic-edge from="master" to="pq"></mosaic-edge>
      <mosaic-edge from="master" to="dcdm"></mosaic-edge>
    </mosaic-workflow>

    <!-- Figure 6 — longplay: the reels of Figure 5 concatenated into one continuous
         sequence with no inter-reel leaders. -->
    <mosaic-reel-timeline data-name="figure-06-longplay" layout="continuous" fps="24"
      aria-label="Longplay composition of a feature — reels concatenated into one continuous sequence">
      <mosaic-reel name="Reel 1" start="01:00:00:00" duration="00:18:22:06"></mosaic-reel>
      <mosaic-reel name="Reel 2" duration="00:19:41:15"></mosaic-reel>
      <mosaic-reel name="Reel 3" duration="00:17:55:11"></mosaic-reel>
      <mosaic-reel name="Reel 4" duration="00:20:03:19"></mosaic-reel>
      <mosaic-reel name="Reel 5" duration="00:16:48:02"></mosaic-reel>
      <mosaic-reel name="Reel 6" duration="00:12:37:20"></mosaic-reel>
    </mosaic-reel-timeline>

    <!-- Figure 7 — premium-cable / OTT commercial-free episode: a single continuous
         program with a slate/head leader and a tail leader. -->
    <mosaic-reel-timeline data-name="figure-07-episode" fps="24" head="240" tail="120"
      aria-label="Premium-cable or OTT commercial-free episode with a slate leader and a tail leader">
      <mosaic-reel name="Episode 1" start="01:00:00:00" duration="00:58:43:14"
        head-label="Slate / Leader" tail-label="Tail Leader"></mosaic-reel>
    </mosaic-reel-timeline>

    <!-- Frame numbering — plate/comp handle frames around edit frames. -->
    <mosaic-frame-sequence data-name="figure-frame-handles"
      aria-label="Plate and comp handle frames surrounding the edit frames of a shot">
      <mosaic-frame-run kind="handle" start="1001" count="4"></mosaic-frame-run>
      <mosaic-frame-run kind="edit" start="1005" count="11"></mosaic-frame-run>
      <mosaic-frame-run kind="handle" start="1016" count="4"></mosaic-frame-run>
    </mosaic-frame-sequence>

    <!-- Frame numbering — a slate frame prepended without offsetting the numbering. -->
    <mosaic-frame-sequence data-name="figure-frame-slate"
      aria-label="A slate frame prepended to the plate handles and edit frames of a shot">
      <mosaic-frame-run kind="slate" start="1000" count="1"></mosaic-frame-run>
      <mosaic-frame-run kind="handle" start="1001" count="4"></mosaic-frame-run>
      <mosaic-frame-run kind="edit" start="1005" count="11"></mosaic-frame-run>
      <mosaic-frame-run kind="handle" start="1016" count="4"></mosaic-frame-run>
    </mosaic-frame-sequence>

    <!-- Generalized production workflow — left-to-right image path with VFX as a
         tangent off editorial, fanning out to theatrical, video, and archival masters. -->
    <mosaic-workflow data-name="production-workflow"
      aria-label="Generalized production workflow: pre-production through acquisition, editorial, and the digital intermediate to deliverables, with visual effects as a tangent off editorial">
      <mosaic-workflow-node id="pre" rank="0" lane="2" icon="timeline" tone="green">Pre-Production</mosaic-workflow-node>
      <mosaic-workflow-node id="prod" rank="1" lane="2" icon="camera" tone="green">Production</mosaic-workflow-node>
      <mosaic-workflow-node id="edit" rank="2" lane="2" icon="resolve" tone="blue">Editorial</mosaic-workflow-node>
      <mosaic-workflow-node id="vfx" rank="3" lane="0" icon="plate" tone="green">Visual Effects</mosaic-workflow-node>
      <mosaic-workflow-node id="di" rank="3" lane="2" icon="resolve" tone="violet">Digital Intermediate</mosaic-workflow-node>
      <mosaic-workflow-node id="dcp" rank="4" lane="1" icon="dcp" tone="coral">DCP</mosaic-workflow-node>
      <mosaic-workflow-node id="video" rank="4" lane="2" icon="monitor" tone="coral">Video Masters</mosaic-workflow-node>
      <mosaic-workflow-node id="archive" rank="4" lane="3" icon="storage" tone="coral">Archival</mosaic-workflow-node>
      <mosaic-edge from="pre" to="prod"></mosaic-edge>
      <mosaic-edge from="prod" to="edit"></mosaic-edge>
      <mosaic-edge from="edit" to="vfx"></mosaic-edge>
      <mosaic-edge from="edit" to="di"></mosaic-edge>
      <mosaic-edge from="di" to="dcp"></mosaic-edge>
      <mosaic-edge from="di" to="video"></mosaic-edge>
      <mosaic-edge from="di" to="archive"></mosaic-edge>
    </mosaic-workflow>

    <!-- Frame numbering — a pull that begins at a padded frame (0997). -->
    <mosaic-frame-sequence data-name="figure-frame-offset"
      aria-label="Plate handles and edit frames for a shot that begins at frame 0997">
      <mosaic-frame-run kind="handle" start="997" count="4"></mosaic-frame-run>
      <mosaic-frame-run kind="edit" start="1001" count="11"></mosaic-frame-run>
      <mosaic-frame-run kind="handle" start="1012" count="4"></mosaic-frame-run>
    </mosaic-frame-sequence>
  </main>

  <!-- The user-facing integration import (resolved via the import map above). -->
  <script type="module">import "@mosaic/technical-graphics";</script>
</body>
</html>
