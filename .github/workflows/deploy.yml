name: Deploy site

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # The published site is the original PDF landing page at the root, with the
      # in-progress wiki under /wiki. Assemble both into one publish directory.
      - name: Build
        run: |
          rm -rf publish
          mkdir -p publish
          cp -R landing/. publish/
          mkdocs build --strict -d publish/wiki
          touch publish/.nojekyll
          test -f publish/index.html
          test -f publish/CNAME
          test -f publish/wiki/index.html

      - name: Deploy to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pip install ghp-import
          ghp-import --no-jekyll --push --force --no-history \
            --message "Deploy: landing page + /wiki" publish
